<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Stilisierte Warteschlange, die sich zu einer Achterbahnstation schlängelt">
  <defs>
    <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset=".55" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="queuePath" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#duskSky)"/>
  <!-- stars -->
  <g fill="#fff" opacity=".5">
    <circle cx="180" cy="90" r="3"/>
    <circle cx="420" cy="60" r="2"/>
    <circle cx="700" cy="110" r="2.5"/>
    <circle cx="1240" cy="70" r="3"/>
    <circle cx="1460" cy="150" r="2"/>
    <circle cx="980" cy="60" r="2"/>
  </g>
  <!-- moon -->
  <circle cx="1330" cy="170" r="56" fill="#fef9c3" opacity=".9"/>
  <circle cx="1310" cy="158" r="52" fill="url(#duskSky)" opacity=".55"/>
  <!-- coaster silhouette -->
  <g fill="none" stroke="#0f172a" stroke-width="10" opacity=".85">
    <path d="M900 560 C 1000 380, 1100 380, 1180 560 S 1350 700, 1600 480"/>
    <path d="M900 560 L 940 620 M1000 452 L 1000 620 M1090 452 L 1090 620 M1180 560 L 1180 620 M1300 620 L 1300 660 M1450 560 L 1450 660"/>
  </g>
  <!-- station -->
  <g fill="#0f172a" opacity=".9">
    <rect x="560" y="540" width="300" height="120" rx="10"/>
    <polygon points="540,548 880,548 860,500 560,500"/>
  </g>
  <!-- wait sign -->
  <g>
    <rect x="360" y="470" width="150" height="96" rx="12" fill="#0f172a"/>
    <rect x="418" y="566" width="12" height="90" fill="#0f172a"/>
    <text x="435" y="512" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" fill="#facc15" font-weight="800" text-anchor="middle">60 Min</text>
    <text x="435" y="546" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#fff" opacity=".8" text-anchor="middle">Wartezeit</text>
  </g>
  <!-- winding queue path -->
  <path d="M80 850 H 1100 M80 850 C 60 790, 120 780, 300 780 H 1000 M1000 780 C 1080 780, 1080 720, 1000 716 H 300 C 220 716, 220 660, 300 656 H 560"
        fill="none" stroke="url(#queuePath)" stroke-width="8" stroke-linecap="round" opacity=".9"/>
  <!-- guests as dots along the queue -->
  <g fill="#fff">
    <circle cx="160" cy="850" r="9"/><circle cx="240" cy="850" r="9"/><circle cx="330" cy="850" r="9"/>
    <circle cx="470" cy="850" r="9"/><circle cx="560" cy="850" r="9"/><circle cx="700" cy="850" r="9"/>
    <circle cx="840" cy="850" r="9"/><circle cx="980" cy="850" r="9"/>
    <circle cx="900" cy="780" r="9"/><circle cx="760" cy="780" r="9"/><circle cx="620" cy="780" r="9"/>
    <circle cx="480" cy="780" r="9"/><circle cx="360" cy="780" r="9"/>
    <circle cx="420" cy="716" r="9"/><circle cx="540" cy="716" r="9"/><circle cx="660" cy="716" r="9"/>
    <circle cx="800" cy="716" r="9"/><circle cx="920" cy="716" r="9"/>
    <circle cx="350" cy="656" r="9"/><circle cx="440" cy="656" r="9"/><circle cx="530" cy="656" r="9"/>
  </g>
  <!-- title -->
  <text x="80" y="180" font-family="ui-sans-serif, system-ui, sans-serif" font-size="68" fill="#fff" font-weight="800" letter-spacing="-1">Die Kunst des Wartens</text>
  <text x="80" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#fff" opacity=".85">Psychologie und Kapazität der Warteschlange</text>
</svg>
