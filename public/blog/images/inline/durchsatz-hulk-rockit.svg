<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 900" role="img" aria-label="Durchsatz als Fläche: Plätze pro Abfahrt mal Abfahrten pro Stunde. Der Hulk ist ein hohes schmales Rechteck (32 Plätze, 60 Abfahrten pro Stunde), Hollywood Rip Ride Rockit ein flaches breites (12 Plätze, 154 Abfahrten pro Stunde) — beide mit fast gleicher Fläche, rund 1900 Personen pro Stunde.">
  <defs>
    <linearGradient id="bgDia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="2100" height="900" fill="url(#bgDia)"/>

  <!-- Formula header -->
  <text x="1050" y="88" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800" fill="#fff">
    Durchsatz&#160;&#160;=&#160;&#160;<tspan fill="#38bdf8">Plätze pro Abfahrt</tspan>&#160;&#160;×&#160;&#160;<tspan fill="#facc15">Abfahrten pro Stunde</tspan>
  </text>
  <text x="1050" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#94a3b8">
    Die Fläche ist der Durchsatz — zwei fast gleiche Flächen, komplett andere Form.
  </text>

  <!-- ===== LEFT PANEL: Hulk (tall & narrow) ===== -->
  <g stroke="#475569" stroke-width="2">
    <line x1="170" y1="800" x2="170" y2="400"/>
    <line x1="170" y1="800" x2="900" y2="800"/>
  </g>
  <text x="200" y="388" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#64748b">↑ Plätze pro Abfahrt</text>
  <!-- rect: 32 seats (h=320) × 60 dispatches (w=264) -->
  <rect x="170" y="480" width="264" height="320" fill="#22c55e" fill-opacity="0.22" stroke="#4ade80" stroke-width="3"/>
  <text x="152" y="640" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#4ade80" transform="rotate(-90 152 640)">32 Plätze</text>
  <text x="302" y="836" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#facc15">60 Abfahrten/h</text>
  <text x="302" y="632" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" fill="#fff">≈ 1.920</text>
  <text x="302" y="668" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#e2e8f0">Personen / Stunde</text>
  <text x="302" y="878" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700" fill="#fff">The Incredible Hulk Coaster</text>

  <!-- ===== equals sign ===== -->
  <text x="1050" y="655" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="70" font-weight="800" fill="#64748b">≈</text>
  <text x="1050" y="700" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#64748b">gleiche Fläche</text>

  <!-- ===== RIGHT PANEL: Rockit (short & wide) ===== -->
  <g stroke="#475569" stroke-width="2">
    <line x1="1230" y1="800" x2="1230" y2="400"/>
    <line x1="1230" y1="800" x2="1960" y2="800"/>
  </g>
  <text x="1260" y="388" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#64748b">↑ Plätze pro Abfahrt</text>
  <!-- rect: 12 seats (h=120) × 154 dispatches (w=678) -->
  <rect x="1230" y="680" width="678" height="120" fill="#ec4899" fill-opacity="0.22" stroke="#f472b6" stroke-width="3"/>
  <text x="1212" y="740" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#f472b6" transform="rotate(-90 1212 740)">12 Plätze</text>
  <text x="1569" y="836" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#facc15">154 Abfahrten/h</text>
  <text x="1569" y="753" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="800" fill="#fff">≈ 1.850 <tspan font-size="21" font-weight="400" fill="#e2e8f0">Personen / Stunde</tspan></text>
  <text x="1569" y="878" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700" fill="#fff">Hollywood Rip Ride Rockit</text>
</svg>
